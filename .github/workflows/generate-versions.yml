name: Generate versions index

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate versions.json
        run: python scripts/generate_versions.py

      - name: Commit versions.json if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'maj versions.json'
          file_pattern: versions.json

      - name: Notify Discord on success
        if: ${{ success() && secrets.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PAGE_URL: https://neotok.github.io/updatePz/
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          latest_version=$(python -c "import json; data=json.load(open('versions.json', encoding='utf-8')); print(data[0]['name'] if data else 'N/A')")

          payload=$(cat <<EOF
          {
            "content": "✅ updatePz mis a jour avec succes.\nVersion: ${latest_version}\nPage: ${PAGE_URL}\nWorkflow: ${RUN_URL}"
          }
          EOF
          )

          curl \
            --fail \
            --show-error \
            --silent \
            -H "Content-Type: application/json" \
            -X POST \
            --data "$payload" \
            "$DISCORD_WEBHOOK_URL"