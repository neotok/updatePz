name: Generate versions index

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate versions.json
        run: python scripts/generate_versions.py

      - name: Commit versions.json if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'maj versions.json'
          file_pattern: versions.json